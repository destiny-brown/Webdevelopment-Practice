
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>2025-26 COMP3322 Assignment Two</title>
    <link rel="stylesheet" href="flight.css" />
</head>
<body>
<div class="container">
    <div id="title">
    <h1>Hong Kong International Airport</h1>
    <h1>Passenger Flight Information</h1>
    </div>

    <form id="dateForm">
        <label for="flightDate">Date of Flight Search</label>
        <input id="flightDate" type="date">
        <button type="submit">Search</button>
    </form>

    <div id="alertMessage" class="alert"></div>

    <!-- Results -->
    <section id="results" class="hidden">
        <header id="reportHeader"></header>

        <div class="cards">
            <!-- Departure Summary card WITH special cases under it -->
            <div class="card">
                <h3>Departure</h3>
                <ul id="departureSummaryList"></ul>
            </div>

            <!-- Arrival Summary card -->
            <div class="card">
                <h3>Arrival</h3>
                <ul id="arrivalSummaryList"></ul>
            </div>

        </div>

        <div class="cards">
            <div class="card">
                <h3>Departure</h3>
                <div id="depHistogram" class="histogram"></div>
            </div>

            <div class="card">
                <h3>Arrival</h3>
                <div id="arrHistogram" class="histogram"></div>
            </div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Top Ten Destinations</h3>
                <ul id="topDestinations"></ul>
            </div>
            <div class="card">
                <h3>Top Ten Origins</h3>
                <ul id="topOrigins"></ul>
            </div>
        </div>
    </section>
</div>
<script src="flight.js" defer></script>
</body>
</html>
